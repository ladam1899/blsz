<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Manager</title>
<script src="https://accounts.google.com/gsi/client"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1a18;--muted:#888680;--dimmed:#b8b5ac;
  --green:#1a6b3a;--green-light:#e8f5ee;--green-mid:#2d9653;
  --red:#c0392b;--red-light:#fdf0ee;
  --gold:#c8980a;--gold-light:#fdf6e0;
  --blue:#1a4fa0;--blue-light:#eaf0fb;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* AUTH */
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:40px 36px;width:380px;max-width:92vw;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.auth-badge{width:56px;height:56px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;color:var(--text);margin-bottom:8px;}
.auth-sub{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:28px;}
.auth-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;width:100%;justify-content:center;}
.auth-btn:hover{background:var(--surface2);border-color:var(--green);}
.auth-note{font-size:11px;color:var(--dimmed);margin-top:14px;line-height:1.6;}

/* HEADER */
header{background:var(--green);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:30;}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;color:#fff;}
.header-right{display:flex;align-items:center;gap:8px;}
.hbtn{font-size:11px;padding:5px 12px;border-radius:4px;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.8);cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;white-space:nowrap;}
.hbtn:hover{background:rgba(255,255,255,.12);color:#fff;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);}
.sync-dot.ok{background:#7dd8a0;}
.sync-dot.busy{background:#f59e0b;animation:pulse 1s infinite;}
.sync-dot.err{background:#f87171;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TOP NAV */
.top-nav{background:var(--surface);border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
.top-nav::-webkit-scrollbar{display:none;}
.tnav-tab{font-size:13px;font-weight:600;padding:14px 20px;border-bottom:3px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;margin-bottom:-2px;}
.tnav-tab:hover{color:var(--text);}
.tnav-tab.active{color:var(--green);border-bottom-color:var(--green);}

/* MAIN */
.main-wrap{max-width:1200px;margin:0 auto;padding:28px 20px;}
.main-wrap.full{max-width:none;padding:0;margin:0;}

/* TEAMS SHEET */
.sheet-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.sheet-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em;color:var(--text);}
.sheet-subtitle{font-size:12px;color:var(--muted);margin-top:2px;}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r2);padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);margin-bottom:20px;}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--green);background:var(--green-light);}
.drop-zone-icon{font-size:2.5rem;margin-bottom:10px;}
.drop-zone p{font-size:14px;color:var(--muted);line-height:1.7;}
.drop-zone p strong{color:var(--green);}
.drop-zone small{font-size:11px;color:var(--dimmed);}

/* SHEET TOOLBAR */
.sheet-toolbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.stbtn{font-size:12px;padding:5px 11px;border-radius:5px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500;font-family:'Inter',sans-serif;}
.stbtn:hover{background:var(--border2);}
.stbtn.primary{background:var(--green);border-color:var(--green);color:#fff;}
.stbtn.primary:hover{background:var(--green-mid);}
.stbtn.danger{border-color:#fca5a5;color:var(--red);}
.stbtn.danger:hover{background:var(--red-light);}
.st-sep{width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0;}
.st-search{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-size:12px;color:var(--text);outline:none;width:160px;font-family:'Inter',sans-serif;}
.st-search:focus{border-color:var(--green);}

/* SPREADSHEET TABLE */
.sheet-table-wrap{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:auto;max-height:calc(100vh - 240px);background:var(--surface);}
.sheet-table{width:max-content;min-width:100%;border-collapse:collapse;font-size:13px;}
.sheet-table thead th{position:sticky;top:0;z-index:2;background:var(--surface2);color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:9px 12px;border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
.sheet-table thead th:hover{color:var(--text);}
.sheet-table thead th.sort-asc::after{content:' ▲';color:var(--green);font-size:9px;}
.sheet-table thead th.sort-desc::after{content:' ▼';color:var(--green);font-size:9px;}
.sheet-table thead th.rn,.sheet-table tbody td.rn{position:sticky;left:0;z-index:1;background:var(--surface2);color:var(--dimmed);font-size:11px;font-family:'JetBrains Mono',monospace;text-align:center;width:40px;min-width:40px;border-right:1px solid var(--border);cursor:pointer;}
.sheet-table thead th.rn{z-index:3;cursor:default;}
.sheet-table tbody tr:nth-child(even) td{background:#faf9f6;}
.sheet-table tbody tr:hover td{background:var(--blue-light) !important;}
.sheet-table tbody tr.row-sel td{background:#dbeafe !important;}
.sheet-table tbody tr.row-sel td.rn{background:#bfdbfe !important;}
.sheet-table tbody tr.row-new td{animation:row-pop .6s ease;}
@keyframes row-pop{from{background:var(--green-light);}}
.sheet-table tbody td{padding:0;border-bottom:1px solid var(--border);vertical-align:middle;}
.sheet-table tbody td.rn{padding:5px 6px;}

.cell{padding:6px 12px;min-height:32px;min-width:80px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;border:1px solid transparent;border-radius:3px;transition:border-color .1s;line-height:1.4;}
.cell:hover{border-color:var(--border2);}
.cell.editing{padding:0;border-color:var(--green);background:var(--green-light);}
.cell.editing input{width:100%;min-width:80px;background:transparent;border:none;color:var(--text);padding:6px 10px;font-size:inherit;font-family:inherit;outline:none;}

/* COLOR CELL */
.color-swatch{display:inline-flex;align-items:center;gap:6px;}
.color-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.1);}

/* SHEET STATUS BAR */
.sheet-statusbar{display:flex;gap:16px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);}
.sheet-statusbar b{color:var(--text);}

/* TEAM MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--r2);padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;margin-bottom:18px;}
.field-group{margin-bottom:14px;}
.field-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block;}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border .15s;}
.field-input:focus{border-color:var(--green);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.mbtn{font-size:13px;padding:9px 18px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.mbtn:hover{color:var(--text);border-color:var(--border2);}
.mbtn.primary{background:var(--green);border-color:var(--green);color:#fff;}
.mbtn.primary:hover{background:var(--green-mid);}
.mbtn.danger{border-color:#fca5a5;color:var(--red);}
.mbtn.danger:hover{background:var(--red-light);}

/* FIND & REPLACE MODAL */
.fr-modal{max-width:400px;}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:14px;opacity:.35;}
.loading{text-align:center;padding:60px;color:var(--muted);}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none;}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);padding:10px 16px;border-radius:8px;font-size:13px;color:var(--text);animation:toast-in .2s ease;max-width:280px;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.toast.warning{border-left-color:var(--gold);}
.toast.error{border-left-color:var(--red);}
@keyframes toast-in{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}

@media(max-width:680px){
  .main-wrap{padding:16px 12px;}
  .sheet-table-wrap{max-height:calc(100vh - 200px);}
}
</style>
</head>
<body>

<!-- Auth Screen -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-badge">⚽</div>
    <div class="auth-title">League Manager</div>
    <div class="auth-sub">Sign in with Google to load and save your data in Google Drive.</div>
    <button class="auth-btn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div class="auth-note">Your data stays in your own Google Drive folder.</div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-logo">⚽ League Manager</div>
  <div class="header-right">
    <div class="sync-dot" id="syncDot" title="Sync status"></div>
    <button class="hbtn" onclick="refreshAll()">↺ Refresh</button>
    <button class="hbtn" onclick="signOut()" id="signOutBtn" style="display:none">Sign out</button>
  </div>
</header>

<!-- Top Nav -->
<div class="top-nav">
  <div class="tnav-tab active" id="tab-teams" onclick="switchTab('teams')">👥 Teams</div>
  <div class="tnav-tab" id="tab-matches" onclick="switchTab('matches')">📅 Matches</div>
  <div class="tnav-tab" id="tab-scorers" onclick="switchTab('scorers')">⚽ Top Scorers</div>
</div>

<!-- Main Content -->
<div class="main-wrap" id="mainWrap">
  <div class="loading"><div class="spinner"></div>Loading…</div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="teamsFileInput" accept=".csv,.txt" style="display:none">
<input type="file" id="matchesFileInput" accept=".csv,.txt" style="display:none">
<input type="file" id="scorersFileInput" accept=".csv,.txt" style="display:none">

<!-- Team Modal -->
<div class="modal-bg" id="teamModal">
  <div class="modal">
    <div class="modal-title" id="teamModalTitle">Add Team</div>
    <div class="field-group"><label class="field-label">Team Name *</label><input class="field-input" type="text" id="tName" placeholder="e.g. Ferencváros TC"></div>
    <div class="field-group"><label class="field-label">Stadium</label><input class="field-input" type="text" id="tStadion" placeholder="e.g. Groupama Aréna"></div>
    <div class="field-group"><label class="field-label">Location / City</label><input class="field-input" type="text" id="tLocation" placeholder="e.g. Budapest"></div>
    <div class="field-group"><label class="field-label">Foundation Year</label><input class="field-input" type="text" id="tFoundation" placeholder="e.g. 1899"></div>
    <div class="field-group">
      <label class="field-label">Team Colour</label>
      <div style="display:flex;align-items:center;gap:10px">
        <input class="field-input" type="color" id="tColor" value="#1a6b3a" style="width:56px;height:40px;padding:2px;cursor:pointer">
        <span style="font-size:12px;color:var(--muted)">Used for the team badge</span>
      </div>
    </div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal('teamModal')">Cancel</button>
      <button class="mbtn primary" onclick="saveTeamModal()">Save Team</button>
    </div>
  </div>
</div>

<!-- Find & Replace Modal -->
<div class="modal-bg" id="frModal">
  <div class="modal fr-modal">
    <div class="modal-title">Find &amp; Replace</div>
    <div class="field-group">
      <label class="field-label">Column</label>
      <select class="field-input" id="frCol"><option value="__all__">All columns</option></select>
    </div>
    <div class="field-group"><label class="field-label">Find</label><input class="field-input" type="text" id="frFind" placeholder="value to find…"></div>
    <div class="field-group"><label class="field-label">Replace with</label><input class="field-input" type="text" id="frReplace" placeholder="new value…"></div>
    <div style="display:flex;gap:16px;margin-bottom:4px;font-size:13px;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--muted)"><input type="checkbox" id="frCase"> Case-insensitive</label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--muted)"><input type="checkbox" id="frRegex"> Regex</label>
    </div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal('frModal')">Cancel</button>
      <button class="mbtn primary" onclick="doFindReplace()">Replace All</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const CLIENT_ID = '584383376067-p4oadd30cutenjtahevq2q4tlr33rsft.apps.googleusercontent.com';
const FOLDER_ID = '16nrjJNIq2OE9KlJE4WX1C2Gb6nBV2Iyo';
const SCOPES    = 'https://www.googleapis.com/auth/drive.file';

// ── STATE ───────────────────────────────────────────────────────
let accessToken = null, tokenClient = null;
let currentTab  = 'teams';

// Per-sheet data: { headers:[], rows:[[]], fileId:null, history:[], modified:0, sortCol:-1, sortDir:1, selected:Set, saveTimer:null }
const sheets = {
  teams:   newSheet(),
  matches: newSheet(),
  scorers: newSheet()
};

const SHEET_DEFAULTS = {
  teams:   ['id','name','color','stadium','location','foundation'],
  matches: ['id','date','round','home','away','home_score','away_score','competition'],
  scorers: ['id','player','team','competition','goals','assists']
};

function newSheet(){
  return {headers:[],rows:[],fileId:null,history:[],modified:0,sortCol:-1,sortDir:1,selected:new Set(),saveTimer:null,lastSaved:null};
}

let editingTeamRowIdx = null; // for modal
let _lastSel = undefined;

// ── AUTH ────────────────────────────────────────────────────────
function initAuth(){
  if(typeof google==='undefined'){setTimeout(initAuth,400);return;}
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES, prompt:'',
    callback:(resp)=>{
      if(resp.error){document.getElementById('authScreen').style.display='flex';return;}
      accessToken = resp.access_token;
      localStorage.setItem('lm_in','1');
      onSignedIn();
    }
  });
  if(localStorage.getItem('lm_in')==='1'){
    document.getElementById('authScreen').style.display='none';
    setSyncStatus('busy');
    tokenClient.requestAccessToken({prompt:''});
  }
}

function signIn(){
  if(!tokenClient){setTimeout(signIn,400);return;}
  tokenClient.requestAccessToken({prompt:'consent'});
}

function signOut(){
  if(accessToken) google.accounts.oauth2.revoke(accessToken,()=>{});
  accessToken=null; localStorage.removeItem('lm_in');
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('signOutBtn').style.display='none';
  setSyncStatus('off');
}

async function onSignedIn(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('signOutBtn').style.display='inline-block';
  await loadAllSheets();
}

// ── SYNC STATUS ─────────────────────────────────────────────────
function setSyncStatus(s){
  const d=document.getElementById('syncDot');
  d.className='sync-dot'+(s==='ok'?' ok':s==='busy'?' busy':s==='err'?' err':'');
  d.title=s==='ok'?'Synced':s==='busy'?'Saving…':s==='err'?'Error':'Not connected';
}

// ── DRIVE ───────────────────────────────────────────────────────
async function driveGet(path,params=''){
  const r=await fetch(`https://www.googleapis.com/drive/v3/${path}${params}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  if(!r.ok) throw new Error(`Drive ${r.status}`);
  return r.json();
}

async function findFile(name){
  const q=encodeURIComponent(`name='${name}' and '${FOLDER_ID}' in parents and trashed=false`);
  const d=await driveGet('files',`?q=${q}&fields=files(id,name,mimeType)`);
  return d.files&&d.files.length ? d.files[0] : null;
}

async function readFile(fileId, mimeType){
  let r;
  if(mimeType==='application/vnd.google-apps.spreadsheet'){
    r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=text%2Fcsv`,{headers:{Authorization:`Bearer ${accessToken}`}});
  } else {
    r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${accessToken}`}});
  }
  if(!r.ok) throw new Error(`Read failed ${r.status}`);
  return r.text();
}

async function writeFileToDrive(name, content, existingId){
  setSyncStatus('busy');
  try{
    if(existingId){
      const meta = await driveGet(`files/${existingId}`,'?fields=mimeType').catch(()=>null);
      if(meta && meta.mimeType==='application/vnd.google-apps.spreadsheet'){
        await fetch(`https://www.googleapis.com/drive/v3/files/${existingId}`,{method:'DELETE',headers:{Authorization:`Bearer ${accessToken}`}});
        existingId=null;
      }
    }
    if(existingId){
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=media`,{
        method:'PATCH', headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'text/csv'}, body:content
      });
      setSyncStatus('ok'); return existingId;
    } else {
      const form=new FormData();
      form.append('metadata', new Blob([JSON.stringify({name, parents:[FOLDER_ID], mimeType:'text/csv'})],{type:'application/json'}));
      form.append('file', new Blob([content],{type:'text/csv'}));
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{
        method:'POST', headers:{Authorization:`Bearer ${accessToken}`}, body:form
      });
      const d=await r.json();
      setSyncStatus('ok'); return d.id;
    }
  }catch(e){setSyncStatus('err');toast('Save error: '+e.message,'error');return existingId;}
}

// ── CSV PARSE / SERIALIZE ───────────────────────────────────────
function parseCSV(text){
  if(!text||!text.trim()) return {headers:[],rows:[]};
  // Full quoted-field parser
  const lines=[];let inQ=false,cur='',row=[];
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c==='"'){if(inQ&&n==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur);cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){
      row.push(cur);cur='';
      if(row.some(v=>v!=='')||row.length>1) lines.push(row);
      row=[];if(c==='\r'&&n==='\n')i++;
    }else cur+=c;
  }
  row.push(cur);
  if(row.some(v=>v!=='')||row.length>1) lines.push(row);
  if(!lines.length) return {headers:[],rows:[]};
  const headers=lines[0].map(h=>h.trim());
  const rows=lines.slice(1).map(r=>{
    const out=r.slice(0,headers.length);
    while(out.length<headers.length) out.push('');
    return out;
  });
  return {headers,rows};
}

function serializeCSV(headers,rows){
  const esc=v=>{v=String(v||'');return(v.includes(',')||v.includes('"')||v.includes('\n'))?`"${v.replace(/"/g,'""')}"`:v;};
  return [headers.join(','),...rows.map(r=>r.map(esc).join(','))].join('\r\n');
}

// ── LOAD ALL SHEETS ─────────────────────────────────────────────
async function loadAllSheets(){
  setSyncStatus('busy');
  try{
    for(const name of ['teams','matches','scorers']){
      const f=await findFile(`${name}.csv`);
      if(f){
        sheets[name].fileId=f.id;
        const text=await readFile(f.id, f.mimeType);
        const {headers,rows}=parseCSV(text);
        sheets[name].headers=headers;
        sheets[name].rows=rows.map(r=>[...r]);
      }
    }
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');toast('Load error: '+e.message,'error');}
  renderTab(currentTab);
}

async function refreshAll(){
  document.getElementById('mainWrap').innerHTML='<div class="loading"><div class="spinner"></div>Refreshing…</div>';
  await loadAllSheets();
}

// ── SAVE SHEET TO DRIVE ─────────────────────────────────────────
async function saveSheet(name){
  const s=sheets[name];
  if(!s.headers.length) return;
  const csv=serializeCSV(s.headers,s.rows);
  const newId=await writeFileToDrive(`${name}.csv`,csv,s.fileId);
  if(newId) s.fileId=newId;
}

function schedSave(name){
  const s=sheets[name];
  clearTimeout(s.saveTimer);
  s.saveTimer=setTimeout(async()=>{
    await saveSheet(name);
    s.lastSaved=new Date();
    s.modified=0;
    updateStatusBar(name);
  },1500);
}

async function forceSave(name){
  const s=sheets[name];
  clearTimeout(s.saveTimer);
  await saveSheet(name);
  s.lastSaved=new Date();
  s.modified=0;
  updateStatusBar(name);
  toast('Saved to Drive','success');
}

// ── LOAD FROM CSV STRING (local import) ─────────────────────────
function loadCSVIntoSheet(name, text, filename){
  const {headers,rows}=parseCSV(text);
  if(!headers.length){toast('Empty or invalid CSV','error');return;}
  const s=sheets[name];
  s.headers=headers;
  s.rows=rows.map(r=>[...r]);
  s.history=[];s.selected=new Set();s.modified=0;s.sortCol=-1;s.sortDir=1;
  schedSave(name); // auto-save to Drive
  renderTab(name);
  toast(`Loaded ${rows.length} rows from ${filename||'CSV'}. Saving to Drive…`,'success');
}

// ── TAB SWITCHING ───────────────────────────────────────────────
function switchTab(name){
  currentTab=name;
  document.querySelectorAll('.tnav-tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('tab-'+name);
  if(el)el.classList.add('active');
  renderTab(name);
}

function renderTab(name){
  const wrap=document.getElementById('mainWrap');
  wrap.className='main-wrap';
  if(name==='teams')   renderTeamsSheet(wrap);
  else if(name==='matches') renderGenericSheet(wrap,'matches','Matches');
  else if(name==='scorers') renderGenericSheet(wrap,'scorers','Top Scorers');
}

// ── FILE INPUT HANDLER ──────────────────────────────────────────
function handleFileInput(e, name){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>loadCSVIntoSheet(name,ev.target.result,f.name);
  r.readAsText(f);
  e.target.value='';
}

// ── RENDER SHEET TABLE ──────────────────────────────────────────
function renderSheetTable(name){
  const s=sheets[name];
  const wrap=document.getElementById(`${name}TableWrap`);
  if(!wrap)return;

  if(!s.headers.length){
    wrap.innerHTML='';
    updateStatusBar(name);
    return;
  }

  const q=(document.getElementById(`${name}Search`)?.value||'').toLowerCase();
  let vis=s.rows.map((r,i)=>({r,i}));
  if(q) vis=vis.filter(({r})=>r.some(v=>v.toLowerCase().includes(q)));
  if(s.sortCol>=0){
    vis.sort((a,b)=>{
      const av=a.r[s.sortCol],bv=b.r[s.sortCol];
      const an=parseFloat(av),bn=parseFloat(bv);
      if(!isNaN(an)&&!isNaN(bn))return(an-bn)*s.sortDir;
      return av.localeCompare(bv)*s.sortDir;
    });
  }

  // Detect color column index
  const colorColIdx=s.headers.findIndex(h=>h.toLowerCase()==='color'||h.toLowerCase()==='colour');

  let thead=`<thead><tr><th class="rn">#</th>`;
  s.headers.forEach((h,i)=>{
    const sc=s.sortCol===i?(s.sortDir===1?' sort-asc':' sort-desc'):'';
    thead+=`<th class="${sc}" data-ci="${i}">${esc(h)}</th>`;
  });
  thead+=`</tr></thead>`;

  let tbody='<tbody>';
  vis.forEach(({r,i:origIdx})=>{
    const sel=s.selected.has(origIdx);
    tbody+=`<tr data-idx="${origIdx}"${sel?' class="row-sel"':''}>`;
    tbody+=`<td class="rn" data-ridx="${origIdx}">${origIdx+1}</td>`;
    r.forEach((val,ci)=>{
      let display=esc(val);
      if(ci===colorColIdx&&val){
        display=`<span class="color-swatch"><span class="color-dot" style="background:${esc(val)}"></span>${esc(val)}</span>`;
      }
      tbody+=`<td><div class="cell" data-r="${origIdx}" data-c="${ci}" data-sn="${name}">${display}</div></td>`;
    });
    tbody+='</tr>';
  });
  tbody+='</tbody>';

  wrap.innerHTML=`<table class="sheet-table">${thead}${tbody}</table>`;

  // Sort
  wrap.querySelectorAll('thead th[data-ci]').forEach(th=>{
    th.addEventListener('click',()=>{
      const ci=parseInt(th.dataset.ci);
      s.sortCol===ci ? s.sortDir*=-1 : (s.sortCol=ci, s.sortDir=1);
      renderSheetTable(name);
    });
  });
  // Cell edit
  wrap.querySelectorAll('.cell').forEach(cell=>cell.addEventListener('click',()=>startCellEdit(cell)));
  // Row select
  wrap.querySelectorAll('td.rn[data-ridx]').forEach(td=>td.addEventListener('click',e=>toggleRowSel(name,parseInt(td.dataset.ridx),e)));

  updateStatusBar(name, vis.length);
}

function updateStatusBar(name, visCount){
  const s=sheets[name];
  const r=document.getElementById(`${name}Rows`);if(r)r.textContent=s.rows.length;
  const sel=document.getElementById(`${name}Sel`);if(sel)sel.textContent=s.selected.size;
  const m=document.getElementById(`${name}Mod`);if(m)m.textContent=s.modified;
  const sv=document.getElementById(`${name}Saved`);
  if(sv)sv.textContent=s.lastSaved?'Saved '+s.lastSaved.toLocaleTimeString():(s.fileId?'Loaded from Drive':'Not yet saved');
}

// ── CELL EDITING ────────────────────────────────────────────────
function startCellEdit(cell){
  if(cell.classList.contains('editing'))return;
  const name=cell.dataset.sn;
  const rowIdx=parseInt(cell.dataset.r);
  const colIdx=parseInt(cell.dataset.c);
  const s=sheets[name];
  if(!s.rows[rowIdx])return;
  const prev=s.rows[rowIdx][colIdx];

  cell.classList.add('editing');
  cell.innerHTML='';
  const inp=document.createElement('input');
  inp.type='text';inp.value=prev;
  cell.appendChild(inp);inp.focus();inp.select();

  const commit=()=>{
    const nv=inp.value;
    cell.classList.remove('editing');
    if(nv!==prev){
      pushHistory(name);
      s.rows[rowIdx][colIdx]=nv;
      s.modified++;
      schedSave(name);
    }
    // Re-render cell value
    const colorColIdx=s.headers.findIndex(h=>h.toLowerCase()==='color'||h.toLowerCase()==='colour');
    const val=s.rows[rowIdx]?.[colIdx]??nv;
    if(colIdx===colorColIdx&&val){
      cell.innerHTML=`<span class="color-swatch"><span class="color-dot" style="background:${esc(val)}"></span>${esc(val)}</span>`;
    } else {
      cell.textContent=val;
    }
    updateStatusBar(name);
  };

  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Tab'){
      e.preventDefault();inp.blur();
      const all=[...document.querySelectorAll(`.cell[data-sn="${name}"]`)];
      const idx=all.indexOf(cell);
      if(idx>=0&&idx<all.length-1)setTimeout(()=>all[idx+1].click(),0);
    }
    if(e.key==='Escape'){cell.classList.remove('editing');cell.textContent=prev;}
    e.stopPropagation();
  });
}

// ── ROW SELECTION ───────────────────────────────────────────────
function toggleRowSel(name,idx,e){
  const s=sheets[name];
  if(e.shiftKey&&_lastSel!==undefined){
    const lo=Math.min(idx,_lastSel),hi=Math.max(idx,_lastSel);
    for(let i=lo;i<=hi;i++) s.selected.add(i);
  } else if(e.ctrlKey||e.metaKey){
    s.selected.has(idx)?s.selected.delete(idx):s.selected.add(idx);
  } else {
    s.selected.clear();s.selected.add(idx);
  }
  _lastSel=idx;
  const wrap=document.getElementById(`${name}TableWrap`);
  if(wrap) wrap.querySelectorAll('tbody tr').forEach(tr=>tr.classList.toggle('row-sel',s.selected.has(+tr.dataset.idx)));
  updateStatusBar(name);
}

// ── ADD / DELETE ROWS ───────────────────────────────────────────
function sheetAddRow(name){
  const s=sheets[name];
  if(!s.headers.length){
    s.headers=[...SHEET_DEFAULTS[name]];
    s.rows=[];
  }
  pushHistory(name);
  const newRow=s.headers.map(h=>{
    if(h==='id') return name[0]+Date.now();
    if(h==='color'||h==='colour') return '#1a6b3a';
    return'';
  });
  s.rows.push(newRow);
  s.modified++;
  schedSave(name);
  renderTab(name);
  // Scroll to bottom
  setTimeout(()=>{const w=document.getElementById(`${name}TableWrap`);if(w)w.scrollTop=w.scrollHeight;},50);
  toast('Row added','success');
}

function sheetDeleteSel(name){
  const s=sheets[name];
  if(!s.selected.size){toast('Select rows first (click the row number)','warning');return;}
  pushHistory(name);
  const del=new Set(s.selected);
  s.rows=s.rows.filter((_,i)=>!del.has(i));
  s.selected.clear();s.modified+=del.size;_lastSel=undefined;
  schedSave(name);
  renderSheetTable(name);
  toast(`Deleted ${del.size} row(s)`,'');
}

// ── UNDO ────────────────────────────────────────────────────────
function pushHistory(name){
  const s=sheets[name];
  s.history.push({headers:[...s.headers],rows:s.rows.map(r=>[...r])});
  if(s.history.length>50)s.history.shift();
}

function sheetUndo(name){
  const s=sheets[name];
  if(!s.history.length){toast('Nothing to undo','warning');return;}
  const snap=s.history.pop();
  s.headers=snap.headers;s.rows=snap.rows;
  s.selected.clear();_lastSel=undefined;
  schedSave(name);
  renderSheetTable(name);
  toast('Undo applied','');
}

// ── FIND & REPLACE ───────────────────────────────────────────────
let frTargetSheet='teams';
function openFR(name){
  frTargetSheet=name;
  const s=sheets[name];
  const sel=document.getElementById('frCol');
  sel.innerHTML='<option value="__all__">All columns</option>'+s.headers.map((h,i)=>`<option value="${i}">${esc(h)}</option>`).join('');
  document.getElementById('frFind').value='';
  document.getElementById('frReplace').value='';
  document.getElementById('frModal').classList.add('open');
}

function doFindReplace(){
  const s=sheets[frTargetSheet];
  const find=document.getElementById('frFind').value;
  const rep=document.getElementById('frReplace').value;
  const colSel=document.getElementById('frCol').value;
  const ci=document.getElementById('frCase').checked;
  const rx=document.getElementById('frRegex').checked;
  if(!find&&!rx){toast('Enter a search value','warning');return;}
  let pattern;
  try{pattern=rx?new RegExp(find,ci?'gi':'g'):null;}
  catch(e){toast('Invalid regex','error');return;}
  pushHistory(frTargetSheet);
  let count=0;
  s.rows.forEach(row=>{
    const cols=colSel==='__all__'?row.map((_,i)=>i):[parseInt(colSel)];
    cols.forEach(ci2=>{
      const v=row[ci2];let nv;
      if(rx)nv=v.replace(pattern,rep);
      else{const flags=ci?'gi':'g';const e=find.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');nv=v.replace(new RegExp(e,flags),rep);}
      if(nv!==v){row[ci2]=nv;count++;}
    });
  });
  s.modified+=count;schedSave(frTargetSheet);
  renderSheetTable(frTargetSheet);
  closeModal('frModal');
  toast(`Replaced ${count} cell(s)`,count?'success':'warning');
}

// ── DOWNLOAD CSV ─────────────────────────────────────────────────
function downloadCSV(name){
  const s=sheets[name];
  if(!s.rows.length){toast('No data to download','warning');return;}
  const csv=serializeCSV(s.headers,s.rows);
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${name}.csv`;a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded!','success');
}

async function saveTeamModal(){

    s.headers=['id','name','color','stadium','location','foundation'];
  }
  pushHistory('teams');
  const row=s.headers.map(h=>{

    if(h==='name')return name;
    if(h==='color'||h==='colour')return document.getElementById('tColor').value;
    if(h==='stadium'||h==='stadion')return document.getElementById('tStadion').value;
    if(h==='location')return document.getElementById('tLocation').value;
    if(h==='foundation')return document.getElementById('tFoundation').value;
    return'';
  });
  s.rows.push(row);
  s.modified++;
  closeModal('teamModal');
  schedSave('teams');
  renderTab('teams');
  toast('Team added','success');
}

// ── UTILS ────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(msg,type=''){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();sheetUndo(currentTab);}
});
